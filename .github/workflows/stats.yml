name: Generate Stats Image
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: stats-update
  cancel-in-progress: false
jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download stats SVG
        run: |
          mkdir -p assets
          curl -sf -A "Mozilla/5.0" \
            "https://github-readme-stats.vercel.app/api?username=abdulmabud&show_icons=true" \
            -o assets/stats.svg

      - name: Validate SVG
        run: |
          if ! grep -q "<svg" assets/stats.svg; then
            echo "::error::Downloaded file is not a valid SVG (likely rate-limited or errored). Aborting commit."
            cat assets/stats.svg
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update stats image"
          git pull --rebase --autostash origin main
          git push origin main
